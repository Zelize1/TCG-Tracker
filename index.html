<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>TCGdex Test</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="button-container">
        <button class="active" data-tab="collected">
          Collected <span id="count-collected">0</span>
        </button>
        <button data-tab="not-collected">
          Not Collected <span id="count-not-collected">0</span>
        </button>
      </div>
    </nav>

    <div id="tab-collected" class="tab-panel active">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="search-group">
            <input type="text" id="search-input" placeholder="Search..." />
            <button class="toggle-btn" id="search-toggle" data-mode="set">Set Name</button>
          </div>
          <div class="filter-group">
            <select id="set-filter">
              <option value="">All Sets</option>
            </select>
            <button class="clear-btn" id="clear-filter">✕</button>
          </div>
        </div>
        <button class="export-btn" id="export-collected">Export Collected</button>
      </div>
      <p class="collection-total">Total collection value: <span id="total-value">...</span></p>
      <div class="pokemon-section">
        <h2 class="pokemon-title">Growlithe</h2>
        <div class="card-container" id="collected-growlithe"></div>
      </div>
      <div class="pokemon-section">
        <h2 class="pokemon-title">Arcanine</h2>
        <div class="card-container" id="collected-arcanine"></div>
      </div>
    </div>

    <div id="tab-not-collected" class="tab-panel">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="search-group">
            <input type="text" id="search-input-not-collected" placeholder="Search..." />
            <button class="toggle-btn" id="search-toggle-not-collected" data-mode="set">Set Name</button>
          </div>
          <div class="filter-group">
            <select id="set-filter-not-collected">
              <option value="">All Sets</option>
            </select>
            <button class="clear-btn" id="clear-filter-not-collected">✕</button>
          </div>
        </div>
        <button class="export-btn" id="export-not-collected">Export Not Collected</button>
      </div>
      <div class="pokemon-section">
        <h2 class="pokemon-title">Growlithe</h2>
        <div class="card-container" id="not-collected-growlithe"></div>
      </div>
      <div class="pokemon-section">
        <h2 class="pokemon-title">Arcanine</h2>
        <div class="card-container" id="not-collected-arcanine"></div>
      </div>
    </div>

    <script>
      document.querySelectorAll("nav button").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("nav button")
            .forEach((b) => b.classList.remove("active"));
          document
            .querySelectorAll(".tab-panel")
            .forEach((p) => p.classList.remove("active"));
          btn.classList.add("active");
          document
            .getElementById(`tab-${btn.dataset.tab}`)
            .classList.add("active");
        });
      });

      document.querySelectorAll(".pokemon-title").forEach((title) => {
        title.addEventListener("click", () => {
          title.closest(".pokemon-section").classList.toggle("collapsed");
        });
      });
    </script>
    <script src="/script/main.js" type="module"></script>
  </body>
</html>
